name: 3d-brain
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Core scientific computing
  - python=3.10
  - numpy>=1.21.0
  - scipy>=1.7.0
  - pandas>=1.3.0
  - scikit-learn>=1.0.0
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  
  # PyTorch (CPU version - change to pytorch::pytorch-cuda for GPU)
  - pytorch::pytorch::cpu
  - pytorch::pytorch-cpu
  - pytorch::torchvision
  
  # Graph analysis
  - python-igraph>=0.9.0
  - leidenalg>=0.9.0
  - networkx>=2.6.0
  
  # Signal processing
  - pywavelets>=1.2.0
  - h5py>=3.0.0
  
  # Data I/O
  - openpyxl>=3.6.0
  
  # Visualization
  - plotly>=5.0.0
  
  # Development tools
  - jupyter>=1.0.0
  - jupyterlab>=3.0.0
  - ipython>=7.0.0
  
  # Documentation
  - sphinx>=4.5.0
  - sphinx_rtd_theme>=1.0.0
  
  # Testing
  - pytest>=6.2.0
  - pytest-cov>=2.12.0
  
  # Code quality
  - black>=21.0.0
  - flake8>=3.9.0
  
pip:
  - python-igraph>=0.9.0
  - leidenalg>=0.9.0
  - elephant>=0.10.0
  - neo>=0.11.0
  - quantities>=0.13.0
  - pyclustering>=0.10.0
  - kneed>=0.8.1
  - fcmeans>=0.1.5
  - joblib>=1.1.0
  - sphinx-autodoc-typehints>=1.12.0
